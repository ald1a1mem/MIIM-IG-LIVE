<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>標題</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

/* 🔥 讓 fullscreen 可以真的填滿 */
#video-container {
  position: relative;
  width: 640px;
  margin: auto;
  transition: all 0.3s ease;
}

/* 全螢幕模式 */
#video-container.fullscreen {
  width: 100vw;
  height: 100vh;
  margin: 0;
}

/* YouTube iframe 撐滿 */
#player,
#player iframe {
  width: 100%;
  height: 360px;
}

#video-container.fullscreen #player,
#video-container.fullscreen iframe {
  width: 100vw !important;
  height: 100vh !important;
}

/* 標題 */
#title {
  font-size: 26px;
  margin: 20px;
  font-weight: bold;
}

/* 字幕 */
#subtitle {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 70%;
  font-family: "Arial Rounded MT Bold","微軟正黑體",sans-serif;
  color: white;
  background: rgba(0,0,0,0.7);
  padding: 6px 14px;
  border-radius: 8px;
  white-space: nowrap;
}

/* 字幕控制 */
#subtitle-controls {
  margin-top: 10px;
}

#subtitle-controls button {
  background: gray;
  color: black;
  border: none;
  padding: 6px 10px;
  margin: 3px;
  cursor: pointer;
}

/* 全螢幕按鈕 */
#fullscreenBtn {
  display: block;
  margin: 12px auto;
  background: gray;
  color: black;
  border: none;
  padding: 10px 18px;
  cursor: pointer;
}

/* 退出全螢幕 */
#exitFullscreenBtn {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  color: white;
  border: 1px solid white;
  padding: 6px 10px;
  cursor: pointer;
  display: none;
  z-index: 10;
}
</style>
</head>

<body>

<div id="title">標題</div>

<div id="video-container">
  <div id="player"></div>
  <div id="subtitle">字幕載入中...</div>
  <button id="exitFullscreenBtn">退出全螢幕</button>
</div>

<div id="subtitle-controls">
  <button onclick="changeSubtitleSize(0.1)">放大</button>
  <button onclick="changeSubtitleSize(-0.1)">縮小</button>
  <button onclick="resetSubtitleSize()">復原</button>
</div>

<button id="fullscreenBtn">全螢幕</button>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player = null;
const videoId = "ytUfCqnBFvg";

let subtitleSize = 0.7;

/* 建立播放器 */
function createPlayer() {
  if (!window.YT || !YT.Player) {
    setTimeout(createPlayer, 100);
    return;
  }

  player = new YT.Player("player", {
    height: "360",
    width: "640",
    videoId: videoId,
    playerVars: {
      fs: 0,
      controls: 1
    }
  });
}
window.onYouTubeIframeAPIReady = createPlayer;

/* 字幕 */
const subtitles = [
  { time: 0, text: "LEO：向大家問好  ONE DESTINY\nDRIVE TO THE TOP" },
  { time: 2, text: "大家好，我們是 ALPHA DRIVE ONE" },
  { time: 4, text: "LEO：LEO" },
];

function updateSubtitle() {
  if (!player || typeof player.getCurrentTime !== "function") return;

  const t = player.getCurrentTime();
  let text = "";

  for (let i = 0; i < subtitles.length; i++) {
    if (t >= subtitles[i].time) text = subtitles[i].text;
  }

  const el = document.getElementById("subtitle");
  el.innerText = text;
  el.style.fontSize = (subtitleSize * 100) + "%";
}

setInterval(updateSubtitle, 500);

/* 字幕控制 */
function changeSubtitleSize(amount) {
  subtitleSize = Math.min(2, Math.max(0.3, subtitleSize + amount));
}

function resetSubtitleSize() {
  subtitleSize = 0.7;
}

/* 🔥 全螢幕（F11效果） */
const container = document.getElementById("video-container");
const exitBtn = document.getElementById("exitFullscreenBtn");

function enterFullscreen() {
  if (container.requestFullscreen) {
    container.requestFullscreen();
  }
}

function exitFullscreen() {
  if (document.exitFullscreen) {
    document.exitFullscreen();
  }
}

/* 進入全螢幕時強制撐滿 */
document.addEventListener("fullscreenchange", () => {
  const isFull = !!document.fullscreenElement;

  container.classList.toggle("fullscreen", isFull);
  exitBtn.style.display = isFull ? "block" : "none";
});

document.getElementById("fullscreenBtn").onclick = enterFullscreen;
exitBtn.onclick = exitFullscreen;
</script>

</body>
</html>
